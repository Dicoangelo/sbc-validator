# Fly.io config for the public SBC-AutoOps readiness scanner.
app = "sbc-autoops-scanner"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[experimental]
  cmd = ["scan-serve", "--host", "0.0.0.0", "--port", "8080", "--log", "/data/scans.jsonl"]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "scandata"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
