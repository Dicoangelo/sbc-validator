# Fly.io config for the public SBC-AutoOps readiness scanner.
# Runs the existing Docker image's CLI as `sbc-validator scan-serve` (the Dockerfile
# ENTRYPOINT is `sbc-validator`, so cmd args below append to it).
app = "sbc-autoops-scanner"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[experimental]
  cmd = ["scan-serve", "--host", "0.0.0.0", "--port", "8080"]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
