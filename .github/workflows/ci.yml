name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -q
      - name: Smoke (4-vendor fleet + simulate + explain)
        run: ./demo.sh

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t sbc-validator .
      - name: Air-gapped smoke (--network none proves nothing leaves)
        run: |
          docker run --rm --network none sbc-validator \
            validate samples/clean_pass.ini \
            --ruleset rulesets/ms_direct_routing_2026-06.json
