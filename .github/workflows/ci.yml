name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -q
      - name: Smoke (4-vendor fleet + simulate + explain)
        run: ./demo.sh

  audit:
    # Keeps the SECURITY.md claim ("pip-audit runs clean") continuously true.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install runtime only
        # Upgrade pip first: the audit scans the whole environment, and a stale
        # runner pip (e.g. PYSEC-2026-196 in 26.1.1) fails the job for a
        # vulnerability that is not ours.
        run: |
          python -m pip install -U pip
          pip install .
      - name: pip-audit (runtime dependency surface)
        run: |
          pip install pip-audit
          pip-audit

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t sbc-validator .
      - name: Air-gapped smoke (--network none proves nothing leaves)
        run: |
          docker run --rm --network none sbc-validator \
            validate samples/clean_pass.ini \
            --ruleset rulesets/ms_direct_routing_2026-06.json
      - name: Air-gapped demo as non-root (catches read-only-path regressions)
        run: |
          docker run --rm --network none sbc-validator demo
