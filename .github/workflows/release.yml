name: Release

# Publishes the local-first container image to GitHub Container Registry, but
# ONLY when a version tag is pushed (e.g. `git tag v0.14.0 && git push --tags`).
# Nothing publishes on ordinary commits. The image inherits the repo's
# visibility (private repo -> private package).

on:
  push:
    tags: ["v*"]

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to ghcr.io with the built-in GITHUB_TOKEN
      id-token: write          # keyless cosign signing via GitHub OIDC
    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign the image (keyless, Sigstore)
        # Signs the pushed digest with an ephemeral certificate bound to this
        # workflow's OIDC identity. Verify with:
        #   cosign verify ghcr.io/dicoangelo/sbc-validator@<digest> \
        #     --certificate-identity-regexp 'github.com/Dicoangelo/sbc-validator' \
        #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
        run: |
          IMG=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          cosign sign --yes "${IMG}@${{ steps.build.outputs.digest }}"

      - name: Air-gapped smoke on the published image
        run: |
          # ghcr.io repository names must be lowercase; github.repository keeps the
          # owner's display casing (Dicoangelo), so lowercase it for docker run.
          IMG=$(echo "ghcr.io/${{ github.repository }}:latest" | tr '[:upper:]' '[:lower:]')
          docker run --rm --network none -v "$PWD/samples:/work" "$IMG" \
            validate /work/audiocodes_teams_real.ini \
            --ruleset rulesets/ms_direct_routing_2026-06.json
