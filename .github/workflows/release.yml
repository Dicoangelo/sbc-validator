name: Release

# Publishes the local-first container image to GitHub Container Registry, but
# ONLY when a version tag is pushed (e.g. `git tag v0.14.0 && git push --tags`).
# Nothing publishes on ordinary commits. The image inherits the repo's
# visibility (private repo -> private package).

on:
  push:
    tags: ["v*"]

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to ghcr.io with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Air-gapped smoke on the published image
        run: |
          IMG=ghcr.io/${{ github.repository }}:latest
          docker run --rm --network none -v "$PWD/samples:/work" "$IMG" \
            validate /work/audiocodes_teams_real.ini \
            --ruleset rulesets/ms_direct_routing_2026-06.json
