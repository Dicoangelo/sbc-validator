;**************
;** Ini File ** (AudioCodes Mediant SBC, real parameter-table format)
;** Microsoft Teams Direct Routing - Enterprise model (abridged)
;**************
; sbc-validator: leaf-cert samples/sbc01_leaf.pem

EnableMediaSecurity = 1
SIPGatewayName = sbc01.contoso.com

[ TLSContexts ]
FORMAT Index = Name;
TLSContexts 0 = "Teams-TLS";
[ \TLSContexts ]

[ ProxySet ]
FORMAT Index = ProxyName, TLSContext, ProxyKeepAliveType;
ProxySet 1 = "Teams", "Teams-TLS", 1;
ProxySet 2 = "Carrier", "", 0;
[ \ProxySet ]

[ ProxyIP ]
FORMAT Index = ProxySetId, IPAddress, TransportType;
ProxyIP 0 = 1, "sip.pstnhub.microsoft.com", 2;
ProxyIP 1 = 1, "sip2.pstnhub.microsoft.com", 2;
ProxyIP 2 = 2, "sbc-trunk.carrier.example", 1;
[ \ProxyIP ]

[ SIPInterface ]
FORMAT Index = InterfaceName, ApplicationType, TLSContext, TCPPort, TLSPort;
SIPInterface 0 = "Teams", 2, "Teams-TLS", 0, 5061;
SIPInterface 1 = "Carrier", 2, "", 5060, 0;
[ \SIPInterface ]

[ IPProfile ]
FORMAT Index = ProfileName, SBCMediaSecurityBehaviour, SBCAllowedAudioCodersGroupName;
IPProfile 1 = "Teams", 1, "AudioCodersGroups_0";
IPProfile 2 = "Carrier", 0, "AudioCodersGroups_0";
[ \IPProfile ]

[ CodersGroup0 ]
FORMAT Index = CodersGroupName, Coder;
CodersGroup0 0 = "AudioCodersGroups_0", "g711Ulaw";
CodersGroup0 1 = "AudioCodersGroups_0", "g722";
[ \CodersGroup0 ]

[ IPGroup ]
FORMAT Index = Name, Type, ProxySetName, IPProfileName, SIPInterfaceName;
IPGroup 1 = "Teams", 0, "Teams", "Teams", "Teams";
IPGroup 2 = "Carrier", 0, "Carrier", "Carrier", "Carrier";
[ \IPGroup ]

[ MediaRealm ]
FORMAT Index = MediaRealmName, IPAddress;
MediaRealm 0 = "MR_Teams", "80.0.0.30";
[ \MediaRealm ]
