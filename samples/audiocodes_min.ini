[audiocodes]
vendor = audiocodes
sbc_fqdn = sbc01.contoso.com

[tls:Teams]
mtls = true
cert_file = samples/sbc01_leaf.pem
; only 4 of 7 required roots installed -> CRITICAL
trusted_roots = DigiCertGlobalRootG2, DigiCertGlobalRootG3, MicrosoftRSARootCA2017, BaltimoreCyberTrustRoot

[sip:Teams-SIP]
role = teams
fqdn = sbc01.contoso.com
tls_context = Teams
; transport TCP -> should be TLS (B), no OPTIONS keepalive (B)
transport = tcp
options_keepalive = false
codecs = PCMU, G722
dtmf_method = rfc2833

[sip:Carrier-SIP]
role = carrier
transport = tls
options_keepalive = true
; no common codec with Teams leg -> E cross-overlap; different DTMF -> E inconsistent
codecs = G729
dtmf_method = inband

[media:Default]
advertised_public_ip = 10.20.30.40
local_ip = 10.20.30.40
ice = false
symmetric_rtp = false
