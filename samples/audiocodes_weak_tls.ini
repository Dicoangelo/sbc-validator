; AudioCodes (simplified stand-in) — a Teams SBC that is otherwise correct but
; pins a legacy TLS floor and a cipher set Microsoft Direct Routing will not accept.
; Exercises C.TLS.WEAK_VERSION (HIGH) and C.TLS.CIPHER_NOT_ALLOWED (CRITICAL).
[audiocodes]
vendor = audiocodes
sbc_fqdn = sbc09.contoso.com

[tls:Teams]
mtls = true
cert_cn = sbc09.contoso.com
cert_sans = sbc09.contoso.com
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true
trusted_roots = DigiCertGlobalRootCA, DigiCertGlobalRootG2, DigiCertGlobalRootG3, DigiCertTLSECCP384RootG5, DigiCertTLSRSA4096RootG5, MicrosoftECCRootCA2017, MicrosoftRSARootCA2017
min_tls = 1.0
ciphers = TLS_RSA_WITH_AES_128_CBC_SHA, TLS_RSA_WITH_3DES_EDE_CBC_SHA

[sip:Teams-SIP]
role = teams
fqdn = sbc09.contoso.com
tls_context = Teams
transport = tls
options_keepalive = true
codecs = PCMU, G722
dtmf_method = rfc2833
srtp = true

[media:Default]
advertised_public_ip = 80.0.0.9
local_ip = 10.1.1.9
symmetric_rtp = true
ice = true
