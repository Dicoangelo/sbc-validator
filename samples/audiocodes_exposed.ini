; AudioCodes Mediant - Teams Direct Routing with an EXPOSED firewall posture.
; Demonstrates domain S firing through the real table-ini parser:
;   - one broad permit (/16) where the carrier publishes a /28
;   - signaling ports only (no media-plane permit)
;   - no default-deny (system-default admits any peer)
;   - IPv4 only (IPv6 plane left default-allow)
EnableMediaSecurity = 1
SIPGatewayName = "sbc-exposed.contoso.com"

[ SIPInterface ]
FORMAT Index = InterfaceName, ApplicationType, TLSContext, TCPPort, TLSPort;
SIPInterface 0 = "Teams", 2, "Teams-TLS", 0, 5061;
[ \SIPInterface ]

[ ProxySet ]
FORMAT Index = ProxyName, ProxyKeepAliveType, TLSContext;
ProxySet 0 = "Teams", 1, "Teams-TLS";
[ \ProxySet ]

[ ProxyIP ]
FORMAT Index = ProxySetId, IPAddress, TransportType;
ProxyIP 0 = "Teams", "sip.pstnhub.microsoft.com", 2;
[ \ProxyIP ]

[ IPGroup ]
FORMAT Index = Name, ProxySetName, SIPInterfaceName;
IPGroup 0 = "Teams", "Teams", "Teams";
[ \IPGroup ]

[ AccessList ]
FORMAT Index = AccessList_Source_IP, AccessList_PrefixLen, AccessList_Start_Port, AccessList_End_Port, AccessList_Allow_Type;
AccessList 0 = "198.51.0.0", 16, 5060, 5061, Allow;
[ \AccessList ]
