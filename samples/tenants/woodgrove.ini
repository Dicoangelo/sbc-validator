; Tenant 1 of a carrier/SBCaaS estate (Microsoft multi-tenant model): subdomain
; under the carrier base domain, shared wildcard cert *.sbc1.adatum.biz. CLEAN.
[audiocodes]
vendor = audiocodes
sbc_fqdn = woodgrovebank.sbc1.adatum.biz

[tls:Teams]
mtls = true
cert_cn = *.sbc1.adatum.biz
cert_sans = *.sbc1.adatum.biz
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true
trusted_roots = DigiCertGlobalRootCA, DigiCertGlobalRootG2, DigiCertGlobalRootG3, DigiCertTLSECCP384RootG5, DigiCertTLSRSA4096RootG5, MicrosoftECCRootCA2017, MicrosoftRSARootCA2017

[sip:Teams-SIP]
role = teams
fqdn = woodgrovebank.sbc1.adatum.biz
tls_context = Teams
transport = tls
options_keepalive = true
options_keepalive_interval = 120
contact_fqdn = woodgrovebank.sbc1.adatum.biz
codecs = PCMU, G722
dtmf_method = rfc2833
srtp = true

[media:Default]
advertised_public_ip = 80.0.0.21
local_ip = 10.2.1.21
symmetric_rtp = true
ice = true
