[audiocodes]
vendor = audiocodes
; Standby node for sbc05.fabrikam.com (HA pair). Diff against clean_pass.ini.
sbc_fqdn = sbc05b.fabrikam.com

[tls:Teams]
mtls = true
cert_cn = sbc05.fabrikam.com
cert_sans = sbc05.fabrikam.com
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true
; DRIFT: standby is missing DigiCert TLS RSA 4096 Root G5 (6 of 7 vs active's full 7)
trusted_roots = DigiCertGlobalRootCA, DigiCertGlobalRootG2, DigiCertGlobalRootG3, DigiCertTLSECCP384RootG5, MicrosoftECCRootCA2017, MicrosoftRSARootCA2017

[sip:Teams-SIP]
role = teams
fqdn = sbc05b.fabrikam.com
tls_context = Teams
transport = tls
; DRIFT: keep-alive disabled on standby (enabled on active)
options_keepalive = false
codecs = PCMU, G722
dtmf_method = rfc2833

[sip:Carrier-SIP]
role = carrier
transport = tls
tls_context = Carrier
options_keepalive = true
normalization_profile = CarrierNorm
codecs = PCMU, G722
dtmf_method = rfc2833

[tls:Carrier]
mtls = false
cert_cn = sbc05.fabrikam.com
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true

[media:Default]
advertised_public_ip = 80.0.0.6
local_ip = 10.1.1.6
symmetric_rtp = true
ice = true
