; ─────────────────────────────────────────────────────────────────────────────
;  sbc-teams-01.contoso.com — FIXED config (the "after")
;  The same SBC with every finding from sbc-teams-01-broken.ini remediated.
;  Validate it:  sbc-validator validate samples/walkthrough/sbc-teams-01-fixed.ini \
;                  --ruleset rulesets/ms_direct_routing_2026-06.json
;  Expected: PASS.
; ─────────────────────────────────────────────────────────────────────────────
[audiocodes]
vendor = audiocodes
sbc_fqdn = sbc-teams-01.contoso.com

[tls:Teams]
; FIX: mTLS enabled
mtls = true
cert_cn = sbc-teams-01.contoso.com
cert_sans = sbc-teams-01.contoso.com
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true
; FIX: all 7 required roots installed (DigiCert G5 pair added)
trusted_roots = DigiCertGlobalRootCA, DigiCertGlobalRootG2, DigiCertGlobalRootG3, DigiCertTLSECCP384RootG5, DigiCertTLSRSA4096RootG5, MicrosoftECCRootCA2017, MicrosoftRSARootCA2017

[sip:Teams-SIP]
role = teams
fqdn = sbc-teams-01.contoso.com
tls_context = Teams
; FIX: transport TLS
transport = tls
; FIX: OPTIONS keep-alive enabled
options_keepalive = true
codecs = PCMU, G722
dtmf_method = rfc2833
; FIX: SRTP enabled
srtp = true

[sip:Carrier-SIP]
role = carrier
transport = tls
tls_context = Carrier
options_keepalive = true
normalization_profile = CarrierNorm
codecs = PCMU, G722
dtmf_method = rfc2833

[tls:Carrier]
mtls = false
cert_cn = sbc-teams-01.contoso.com
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true

[media:Default]
role = teams
; FIX: a public, routable media address + symmetric RTP
advertised_public_ip = 80.0.0.40
local_ip = 10.50.30.40
symmetric_rtp = true
ice = true
