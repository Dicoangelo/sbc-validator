; ─────────────────────────────────────────────────────────────────────────────
;  sbc-teams-01.contoso.com — BROKEN config (the "before")
;  A real-shaped AudioCodes Teams Direct Routing SBC with the failures a 2026
;  CA-migration audit catches. Pair with sbc-teams-01-fixed.ini to see it go green.
;  Walk it:  sbc-validator walk samples/walkthrough/sbc-teams-01-broken.ini
; ─────────────────────────────────────────────────────────────────────────────
[audiocodes]
vendor = audiocodes
sbc_fqdn = sbc-teams-01.contoso.com

[tls:Teams]
; mTLS is OFF — Direct Routing requires mutual TLS               -> C.TLS.MTLS_DISABLED
mtls = false
cert_cn = sbc-teams-01.contoso.com
cert_sans = sbc-teams-01.contoso.com
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true
; only 5 of the 7 required roots: missing the DigiCert TLS G5 pair Microsoft is
; migrating onto — the exact 2026 gap                            -> C.CA.ROOT_MISSING (CRITICAL)
trusted_roots = DigiCertGlobalRootCA, DigiCertGlobalRootG2, DigiCertGlobalRootG3, MicrosoftECCRootCA2017, MicrosoftRSARootCA2017

[sip:Teams-SIP]
role = teams
fqdn = sbc-teams-01.contoso.com
tls_context = Teams
; transport is TCP — Teams requires TLS                          -> B.SIP.TRANSPORT (HIGH)
transport = tcp
; no health keep-alive — Teams will mark the SBC down            -> B.SIP.OPTIONS_KEEPALIVE
options_keepalive = false
codecs = PCMU, G722
dtmf_method = rfc2833
; media encryption OFF — Teams won't establish media             -> C.SRTP.DISABLED (HIGH)
srtp = false

[sip:Carrier-SIP]
role = carrier
transport = tls
tls_context = Carrier
options_keepalive = true
normalization_profile = CarrierNorm
codecs = PCMU, G722
dtmf_method = rfc2833

[tls:Carrier]
mtls = false
cert_cn = sbc-teams-01.contoso.com
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true

[media:Default]
role = teams
; a PRIVATE address advertised in SDP — remote media can't return -> D.NAT.PRIVATE_ADVERTISED (CRITICAL)
advertised_public_ip = 10.50.30.40
local_ip = 10.50.30.40
; symmetric RTP / latching OFF                                    -> D.NAT.NO_SYMMETRIC_RTP
symmetric_rtp = false
ice = false
