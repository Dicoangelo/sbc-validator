; AudioCodes (simplified stand-in) — a carrier/multi-tenant hosting SBC.
; Wildcard cert *.sbc1.adatum.biz (valid for the hosting model, must NOT be flagged).
; Two deliberate B-domain faults: an out-of-range OPTIONS interval and a Contact
; header FQDN that is not under the SBC's registered domain.
; Exercises B.SIP.OPTIONS_INTERVAL (MEDIUM) + B.SIP.CONTACT_FQDN (HIGH), and proves
; wildcard-cert handling (no C.CERT.FQDN_MISMATCH).
[audiocodes]
vendor = audiocodes
sbc_fqdn = teams.sbc1.adatum.biz

[tls:Teams]
mtls = true
cert_cn = *.sbc1.adatum.biz
cert_sans = *.sbc1.adatum.biz
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true
trusted_roots = DigiCertGlobalRootCA, DigiCertGlobalRootG2, DigiCertGlobalRootG3, DigiCertTLSECCP384RootG5, DigiCertTLSRSA4096RootG5, MicrosoftECCRootCA2017, MicrosoftRSARootCA2017

[sip:Teams-SIP]
role = teams
fqdn = teams.sbc1.adatum.biz
tls_context = Teams
transport = tls
options_keepalive = true
options_keepalive_interval = 300
contact_fqdn = contoso.com
codecs = PCMU, G722
dtmf_method = rfc2833
srtp = true

[media:Default]
advertised_public_ip = 80.0.0.7
local_ip = 10.1.1.7
symmetric_rtp = true
ice = true
