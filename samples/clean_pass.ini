[audiocodes]
vendor = audiocodes
sbc_fqdn = sbc05.fabrikam.com

[tls:Teams]
mtls = true
cert_cn = sbc05.fabrikam.com
cert_sans = sbc05.fabrikam.com
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true
trusted_roots = DigiCertGlobalRootCA, DigiCertGlobalRootG2, DigiCertGlobalRootG3, DigiCertTLSECCP384RootG5, DigiCertTLSRSA4096RootG5, MicrosoftECCRootCA2017, MicrosoftRSARootCA2017

[sip:Teams-SIP]
role = teams
fqdn = sbc05.fabrikam.com
tls_context = Teams
transport = tls
options_keepalive = true
codecs = PCMU, G722
dtmf_method = rfc2833

[sip:Carrier-SIP]
role = carrier
transport = tls
tls_context = Carrier
options_keepalive = true
normalization_profile = CarrierNorm
codecs = PCMU, G722
dtmf_method = rfc2833

[tls:Carrier]
mtls = false
cert_cn = sbc05.fabrikam.com
cert_ekus = serverAuth
cert_not_after = 2027-12-31
chain_complete = true

[media:Default]
advertised_public_ip = 80.0.0.5
local_ip = 10.1.1.5
symmetric_rtp = true
ice = true
