[audiocodes]
vendor = audiocodes
sbc_fqdn = sbc09.northwind.com

[tls:Teams]
mtls = true
cert_cn = sbc09.northwind.com
cert_sans = sbc09.northwind.com
cert_ekus = serverAuth
cert_not_after = 2027-06-30
chain_complete = true
trusted_roots = DigiCertGlobalRootCA, DigiCertGlobalRootG2, DigiCertGlobalRootG3, DigiCertTLSECCP384RootG5, DigiCertTLSRSA4096RootG5, MicrosoftECCRootCA2017, MicrosoftRSARootCA2017

[sip:Teams-SIP]
role = teams
fqdn = sbc09.northwind.com
tls_context = Teams
transport = tcp
options_keepalive = false
codecs = PCMU, G722
dtmf_method = rfc2833

[media:Default]
advertised_public_ip = 80.0.0.9
symmetric_rtp = true
